<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Para ti 💜</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700;900&family=Sacramento&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg1: #000000; 
      --accent1: #c084fc; 
      --accent2: #9333ea; 
      --glass: rgba(255,255,255,0.08);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{min-height:100%;font-family:Montserrat,system-ui,Arial;background:linear-gradient(160deg,var(--bg1) 0%, #1a0b2e 80%);color:#f5f3ff; overflow-x: hidden;}

    .wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem; position: relative;}
    
    .card{
      width:min(900px, 95%);
      display:grid;
      grid-template-columns: 320px 1fr; /* Reducido un poco para mejor encaje */
      gap: 2rem;
      padding: 2rem;
      border-radius: 20px;
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
      box-shadow: 0 10px 35px rgba(0,0,0,0.7);
      position: relative;
      z-index: 2;
      backdrop-filter: blur(10px);
    }

    /* --- RESPONSIVE FIX --- */
    @media (max-width: 768px) {
      body { overflow-y: auto; } /* Permite scroll en celulares */
      .card {
        grid-template-columns: 1fr; /* Una sola columna */
        padding: 1.5rem;
        margin-top: 2rem;
        margin-bottom: 2rem;
      }
      .photoWrap {
        width: 100% !important; /* Foto al ancho completo */
        height: 300px !important;
      }
      h1 { font-size: 1.8rem !important; }
      .controls { flex-direction: column; } /* Botones uno sobre otro */
      .btn { width: 100%; }
    }

    .photoWrap{width:320px;height:420px;border-radius:16px;overflow:hidden;position:relative;background:linear-gradient(135deg,var(--accent1),var(--accent2));padding:6px;box-shadow:0 0 25px rgba(192,132,252,0.5)}
    .photo{width:100%;height:100%;object-fit:cover;border-radius:12px;display:block}
    .badge{position:absolute;left:16px;top:16px;background:rgba(0,0,0,0.4);backdrop-filter:blur(6px);padding:6px 12px;border-radius:999px;font-weight:600;font-size:14px;color:#fff}

    h1{margin:0;font-size:2.4rem;color:white;letter-spacing:-1px}
    .subtitle{color:rgba(244,234,255,0.7);margin-top:6px;font-size:1rem}

    .message{margin-top:12px;background:var(--glass);padding:1.2rem;border-radius:14px;min-height:150px;display:flex;align-items:center;box-shadow:0 4px 15px rgba(192,132,252,0.15)}
    .typing{font-size:1.1rem;line-height:1.6;color:#faf5ff;white-space:pre-line}
    .cursor{display:inline-block;width:2px;height:1rem;background:var(--accent1);margin-left:6px;animation:blink 1s infinite}
    
    @keyframes blink{50%{opacity:0}}

    .btn{padding:12px 16px;border-radius:10px;border:0;background:linear-gradient(90deg,var(--accent1),var(--accent2));color:#0a0114;font-weight:700;cursor:pointer;box-shadow:0 6px 18px rgba(147,51,234,0.3);transition:transform .2s}
    .btn:hover{transform:scale(1.05)}
    .ghost{background:transparent;border:1px solid rgba(255,255,255,0.1);color:#f4eaff}

    .controls{display:flex;gap:12px;margin-top:15px;flex-wrap: wrap;}

    .blob{position:absolute;border-radius:50%;filter:blur(40px);opacity:0.45;z-index:1}
    .blob.one{width:300px;height:300px;right:-50px;top:-50px;background:linear-gradient(180deg,var(--accent2),#a855f7);animation:float1 12s ease-in-out infinite}
    .blob.two{width:250px;height:250px;left:-50px;bottom:-50px;background:linear-gradient(180deg,var(--accent1),#d8b4fe);animation:float2 14s ease-in-out infinite}

    @keyframes float1{0%,100%{transform:translateY(0)}50%{transform:translateY(40px)}}
    @keyframes float2{0%,100%{transform:translateY(0)}50%{transform:translateY(-30px)}}

    .heart{position:fixed;font-size:22px;color:var(--accent1);pointer-events:none;z-index:9999;animation:rise 4s linear forwards}
    @keyframes rise{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-200px) scale(1.8)}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="blob one"></div>
      <div class="blob two"></div>

      <div class="left">
        <div class="photoWrap">
          <img class="photo" src="https://images.unsplash.com/photo-1517841905240-472988babdf9?q=80&w=800&auto=format&fit=crop" alt="Foto especial">
          <div class="badge">Para: Mi amor 💜</div>
        </div>
      </div>

      <div class="right">
        <h1>Hola, mi amor ✨</h1>
        <div class="subtitle">Una sorpresa hecha con todo mi cariño</div>

        <div class="message">
          <div class="typing" id="typingText"></div><div class="cursor" id="cursor"></div>
        </div>

        <div class="controls">
          <button class="btn" id="revealBtn">Mensaje completo</button>
          <button class="btn ghost" id="heartsBtn">💜 Corazones</button>
          <button class="btn" id="musicBtn">🎶 Música</button>
        </div>
      </div>
    </div>
  </div>

  <audio id="bgAudio" loop src="https://www2.cs.uic.edu/~i101/SoundFiles/StarWars60.wav"></audio>

  <script>
    const MESSAGE = [
      "Desde que llegaste, mi mundo tiene más color.",
      "El lila del cielo me recuerda a ti, siempre brillante y único.",
      "Gracias por ser mi razón de sonreír cada día.",
      "Te amo más de lo que estas palabras pueden decir. 💜"
    ];

    const typingText = document.getElementById('typingText');
    const cursor = document.getElementById('cursor');
    let sIndex = 0, cIndex = 0, forward = true, paused = false;

    function typeLoop(){
      if(paused) return;
      const current = MESSAGE[sIndex];
      if(forward){
        typingText.textContent = current.slice(0, cIndex+1);
        cIndex++;
        if(cIndex === current.length){
          forward = false;
          setTimeout(typeLoop, 1500);
          return;
        }
      } else {
        typingText.textContent = current.slice(0, cIndex-1);
        cIndex--;
        if(cIndex === 0){
          forward = true;
          sIndex = (sIndex+1) % MESSAGE.length;
        }
      }
      setTimeout(typeLoop, 70);
    }
    typeLoop();

    document.getElementById('revealBtn').addEventListener('click', ()=>{
      paused = true;
      typingText.textContent = MESSAGE.join('\n\n');
      cursor.style.display = 'none';
    });

    const musicBtn = document.getElementById('musicBtn');
    const audio = document.getElementById('bgAudio');
    let playing = false;
    musicBtn.addEventListener('click', ()=>{
      if(!playing){audio.play();musicBtn.textContent='⏸️ Pausar';playing=true}
      else{audio.pause();musicBtn.textContent='🎶 Música';playing=false}
    });

    document.getElementById('heartsBtn').addEventListener('click', ()=>{
      for(let i=0;i<15;i++){
        setTimeout(()=>{
          const heart=document.createElement('div');
          heart.className='heart';
          heart.style.left=Math.random()*90 + 'vw';
          heart.style.top='80vh';
          heart.textContent='💜';
          document.body.appendChild(heart);
          setTimeout(()=>heart.remove(),4000);
        },i*150);
      }
    });
  </script>
</body>
</html>
