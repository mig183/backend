<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxia de Amor - Three.js</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; }
        #instructions {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            color: white;
            font-family: Arial, sans-serif;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(255,100,200,0.8);
        }
    </style>
</head>
<body>
    <div id="instructions">Efecto inspirado en @fenidev</div>
    <!-- Importamos Three.js desde un CDN -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // 1. Configuración Básica
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const clock = new THREE.Clock();

        // 2. Creación de la Galaxia (Partículas)
        const particlesCount = 5000;
        const positions = new Float32Array(particlesCount * 3);
        const colors = new Float32Array(particlesCount * 3);

        for (let i = 0; i < particlesCount; i++) {
            const i3 = i * 3;
            // Forma de espiral simple
            const radius = Math.random() * 5;
            const spinAngle = radius * 5;
            const branchAngle = (i % 3) * ((Math.PI * 2) / 3);

            positions[i3] = Math.cos(branchAngle + spinAngle) * radius + (Math.random() - 0.5) * 0.5;
            positions[i3 + 1] = (Math.random() - 0.5) * 0.5; // Altura
            positions[i3 + 2] = Math.sin(branchAngle + spinAngle) * radius + (Math.random() - 0.5) * 0.5;

            // Colores (mezcla de rosa y púrpura)
            colors[i3] = 1.0; // R
            colors[i3 + 1] = 0.2 + Math.random() * 0.5; // G
            colors[i3 + 2] = 0.5 + Math.random() * 0.5; // B
        }

        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const material = new THREE.PointsMaterial({
            size: 0.02,
            vertexColors: true,
            transparent: true,
            blending: THREE.AdditiveBlending
        });

        const galaxy = new THREE.Points(geometry, material);
        scene.add(galaxy);

        camera.position.z = 6;
        camera.position.y = 2;
        camera.lookAt(0,0,0);

        // 3. Bucle de Animación (Basado en tu imagen)
        function animate() {
            requestAnimationFrame(animate);
            
            const t = clock.getElapsedTime();

            // Rotación de la galaxia (galaxyGroup en tu imagen)
            galaxy.rotation.y = t * 0.05;

            // Simulación del movimiento flotante (loveImages / loveTexts)
            // Aquí hacemos que toda la galaxia oscile levemente hacia arriba y abajo
            galaxy.position.y = Math.sin(t) * 0.1;

            renderer.render(scene, camera);
        }

        // Manejo de cambio de tamaño de ventana
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
